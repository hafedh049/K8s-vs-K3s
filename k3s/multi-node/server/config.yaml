# /etc/rancher/k3s/config.yaml
# K3s Server Configuration — Multi-Node with PostgreSQL
# Copy to: /etc/rancher/k3s/config.yaml on k3s-server
# Then run: curl -sfL https://get.k3s.io | sh -

# ------------------------------------------------------------
# Datastore — PostgreSQL (required for multi-server HA)
# ------------------------------------------------------------
datastore-endpoint: "postgres://k3suser:k3s@Secure2026@192.168.3.184:5432/k3s"

# ------------------------------------------------------------
# Network
# ------------------------------------------------------------
cluster-cidr: "10.42.0.0/16"
service-cidr: "10.43.0.0/16"
cluster-dns: "10.43.0.10"

# ------------------------------------------------------------
# TLS — Add all IPs/hostnames that will access the API
# ------------------------------------------------------------
tls-san:
  - "192.168.3.184"
  - "k3s-server"

# ------------------------------------------------------------
# Kubeconfig
# ------------------------------------------------------------
write-kubeconfig-mode: "0644"

# ------------------------------------------------------------
# Logging
# ------------------------------------------------------------
log: "/var/log/k3s.log"

# ------------------------------------------------------------
# Node Labels
# ------------------------------------------------------------
node-label:
  - "environment=production"
  - "role=server"

# ------------------------------------------------------------
# Disable built-in components (uncomment if using your own)
# ------------------------------------------------------------
# disable:
#   - traefik       # Uncomment to use NGINX ingress instead
#   - servicelb     # Uncomment to use MetalLB instead
#   - metrics-server
